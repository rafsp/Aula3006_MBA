version: 2
models:
  - name: stg_olist__pedidos
    columns:
      - name: pedido_id
        data_tests: [unique, not_null]
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['delivered','shipped','canceled','unavailable',
                         'invoiced','processing','created','approved']
  - name: stg_olist__itens
    columns:
      - name: pedido_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__pedidos')
                field: pedido_id
